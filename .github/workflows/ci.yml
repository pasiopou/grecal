name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run tests
        run: python -m pytest

      - name: Validate production data
        run: grecal validate

  build:
    name: Build and verify distributions
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install and verify the wheel
        run: |
          python -m venv "$RUNNER_TEMP/grecal-wheel-check"
          "$RUNNER_TEMP/grecal-wheel-check/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/grecal-wheel-check/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/grecal-wheel-check/bin/grecal" validate
          "$RUNNER_TEMP/grecal-wheel-check/bin/grecal" date 2026-08-15
          "$RUNNER_TEMP/grecal-wheel-check/bin/grecal" \
            generate \
            --all \
            --include-feasts \
            --from-year 2026 \
            --output "$RUNNER_TEMP/grecal-smoke.ics" \
            --dry-run
          test ! -e "$RUNNER_TEMP/grecal-smoke.ics"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: grecal-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7
